// ── CANVAS SETUP ───────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

function canvasPos(e){
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};
}

// ── GRID CLASS ─────────────────────────────────────────────────────────────
class Grid {
  constructor(auto=true){
    this.cells=Array.from({length:N},()=>Array(N).fill('~'));
    this.ships=[];
    if(auto) for(const s of SIZES) this._rand(s);
  }
  _rand(size){
    let tries=0;
    while(tries++<1000){
      const o=Math.random()<.5?'H':'V';
      const r=Math.floor(Math.random()*(o==='H'?N:N-size+1));
      const c=Math.floor(Math.random()*(o==='H'?N-size+1:N));
      if(this.canPlace(r,c,size,o)){this.doPlace(r,c,size,o);return;}
    }
  }
  canPlace(r,c,size,o){
    for(let i=0;i<size;i++){
      const rr=r+(o==='V'?i:0), cc=c+(o==='H'?i:0);
      if(rr<0||rr>=N||cc<0||cc>=N) return false;
      if(this.cells[rr][cc]!=='~') return false;
    }
    return true;
  }
  doPlace(r,c,size,o){
    for(let i=0;i<size;i++){
      const rr=r+(o==='V'?i:0), cc=c+(o==='H'?i:0);
      this.cells[rr][cc]='S';
    }
    this.ships.push({row:r,col:c,size,o});
  }
  clear(){this.cells=Array.from({length:N},()=>Array(N).fill('~')); this.ships=[];}
  randomize(){this.clear(); for(const s of SIZES) this._rand(s);}
  attack(r,c){
    const v=this.cells[r][c];
    if(v==='S'){this.cells[r][c]='H';return'hit';}
    if(v==='~'){this.cells[r][c]='M';return'miss';}
    return'already';
  }
  allSunk(){return this.cells.every(row=>row.every(v=>v!=='S'));}
}

// ── DRAWING HELPERS ────────────────────────────────────────────────────────
function rect(x,y,w,h,fill,stroke,lw=1,r=0){
  ctx.beginPath();
  if(r>0){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function txt(text,x,y,color='#e6e6ff',font='24px sans-serif',align='left'){
  ctx.font=font; ctx.fillStyle=color; ctx.textAlign=align; ctx.fillText(text,x,y);
}

function wrapText(text,maxW,font){
  ctx.font=font;
  const words=text.split(' '), lines=[];
  let line='';
  for(const w of words){
    const test=(line?line+' ':'')+w;
    if(ctx.measureText(test).width<=maxW){line=test;}
    else{if(line)lines.push(line); line=w;}
  }
  if(line)lines.push(line);
  return lines;
}

function btn(x,y,w,h,label,hov,active=true,baseC='#284878',hovC='#3c6496',brdC='#4678c8'){
  const c=!active?'#19283a':hov?hovC:baseC;
  rect(x,y,w,h,c,hov&&active?brdC:'#325090',2,8);
  ctx.font='22px sans-serif'; ctx.fillStyle=active?'#e6e6ff':'#646480';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2);
  ctx.textBaseline='alphabetic';
}

function drawShip(ship,gx,gy){
  const {row:r,col:c,size:sz,o}=ship;
  const pad=4;
  const rx=gx+c*CS+pad, ry=gy+r*CS+pad;
  const rw=o==='H'?sz*CS-pad*2:CS-pad*2;
  const rh=o==='H'?CS-pad*2:sz*CS-pad*2;
  rect(rx,ry,rw,rh,'#87889a','#373a48',2,6);
  if(o==='H'){
    rect(rx+4,ry+Math.floor(rh/4),rw-8,Math.floor(rh/2),'#5f6270',null,0,4);
    const bw=Math.max(10,Math.floor(rw/4)), bh=Math.max(6,rh-10);
    rect(rx+Math.floor(rw/2)-Math.floor(bw/2),ry+5,bw,bh,'#a5a8b6',null,0,3);
  }else{
    rect(rx+Math.floor(rw/4),ry+4,Math.floor(rw/2),rh-8,'#5f6270',null,0,4);
    const bw=Math.max(6,rw-10), bh=Math.max(10,Math.floor(rh/4));
    rect(rx+5,ry+Math.floor(rh/2)-Math.floor(bh/2),bw,bh,'#a5a8b6',null,0,3);
  }
}

function drawGrid(grid,gx,gy,hideShips=false,preview=null){
  rect(gx,gy,N*CS,N*CS,'#194b82');
  if(!hideShips) for(const s of grid.ships) drawShip(s,gx,gy);
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const v=grid.cells[r][c];
    const cx=gx+c*CS, cy=gy+r*CS;
    if(v==='H'){
      rect(cx+4,cy+4,CS-8,CS-8,'#d23737',null,0,4);
      ctx.strokeStyle='#ffc800'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(cx+10,cy+10); ctx.lineTo(cx+CS-10,cy+CS-10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+CS-10,cy+10); ctx.lineTo(cx+10,cy+CS-10); ctx.stroke();
    }else if(v==='M'){
      ctx.beginPath(); ctx.arc(cx+CS/2,cy+CS/2,8,0,Math.PI*2);
      ctx.fillStyle='#a0a0b9'; ctx.fill();
      ctx.strokeStyle='#646478'; ctx.lineWidth=2; ctx.stroke();
    }
  }
  if(preview){
    const[pr,pc,psz,po,valid]=preview;
    const col=valid?'rgba(80,210,80,0.6)':'rgba(210,80,80,0.6)';
    const brd=valid?'#50d250':'#d25050';
    for(let i=0;i<psz;i++){
      const rr=pr+(po==='V'?i:0), cc=pc+(po==='H'?i:0);
      if(rr>=0&&rr<N&&cc>=0&&cc<N)
        rect(gx+cc*CS+3,gy+rr*CS+3,CS-6,CS-6,col,brd,1,4);
    }
  }
  ctx.strokeStyle='#3769af'; ctx.lineWidth=1;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    ctx.strokeRect(gx+c*CS,gy+r*CS,CS,CS);
  }
  ctx.font='18px sans-serif'; ctx.fillStyle='#e6e6ff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let c=0;c<N;c++) ctx.fillText(String.fromCharCode(65+c),gx+c*CS+CS/2,gy-14);
  ctx.textAlign='right';
  for(let r=0;r<N;r++) ctx.fillText(String(r+1),gx-6,gy+r*CS+CS/2);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawHud(){
  // Reset
  const rHov=mx>=862&&mx<=970&&my>=10&&my<=44;
  rect(862,10,108,34,rHov?'#3a5c94':'#263e69',rHov?'#5082c8':'#325090',2,6);
  ctx.font='18px sans-serif'; ctx.fillStyle='#e6e6ff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Reset',916,27);
  // Quit
  const qHov=mx>=980&&mx<=1088&&my>=10&&my<=44;
  rect(980,10,108,34,qHov?'#822c2c':'#5a1c1c',qHov?'#be4141':'#8c2828',2,6);
  ctx.fillText('Quit',1034,27);
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
}

// ── GAME STATE ─────────────────────────────────────────────────────────────
let state=MENU, twoPlayer=false, curPlayer=1;
let gridP1=null, gridP2=null;
let plShips=[], plOrient='H';
let status='', aiDelay=0, lastTime=0;
let passMsg='', passNext=PASS;
let qPool=[], activeQ=null, qAnswer=-1;
let scoreP1=0, scoreP2=0;

function newGame(){
  state=MENU; twoPlayer=false; curPlayer=1;
  gridP1=null; gridP2=null;
  plShips=[]; plOrient='H'; status=''; aiDelay=0;
  passMsg=''; passNext=PASS;
  qPool=Array.from({length:QUESTIONS.length},(_,i)=>i);
  activeQ=null; qAnswer=-1; scoreP1=0; scoreP2=0;
}
newGame();

function setupPlacement(player){
  if(player===1) gridP1=new Grid(false);
  else gridP2=new Grid(false);
  plShips=[...SIZES]; plOrient='H';
}

function atkGrid(){return curPlayer===1?gridP1:gridP2;}
function defGrid(){return curPlayer===1?gridP2:gridP1;}

function passToNext(){
  const nxt=3-curPlayer; curPlayer=nxt;
  status=`Player ${nxt}'s turn — click the enemy grid!`;
  passMsg=`Hand the device to Player ${nxt}\n\nPlayer ${nxt} — it's your turn!`;
  passNext=PLAY; state=PASS;
}

function startQuestion(){
  if(!qPool.length) qPool=Array.from({length:QUESTIONS.length},(_,i)=>i);
  const i=Math.floor(Math.random()*qPool.length);
  const idx=qPool.splice(i,1)[0];
  activeQ=QUESTIONS[idx]; qAnswer=-1; state=QST;
}

function resolveQuestion(){
  const correct=qAnswer===activeQ.a;
  if(correct){
    if(curPlayer===1) scoreP1++; else scoreP2++;
    status='Correct! Bonus turn!'; state=PLAY;
  }else{
    status='Incorrect. Switch turns.';
    if(twoPlayer) passToNext();
    else{curPlayer=2; aiDelay=0; state=PLAY;}
  }
}

function aiTurn(){
  let tries=0;
  while(tries++<200){
    const r=Math.floor(Math.random()*N), c=Math.floor(Math.random()*N);
    const res=gridP1.attack(r,c);
    if(res!=='already'){
      status=res==='hit'?'AI hit! Your turn.':'AI missed. Your turn.';
      return;
    }
  }
}

function cellAt(gx,gy){
  if(mx>=gx&&mx<gx+N*CS&&my>=gy&&my<gy+N*CS)
    return[Math.floor((my-gy)/CS),Math.floor((mx-gx)/CS)];
  return null;
}

function placementHover(){return cellAt(...PG);}

  btn(...B.b2p,'2 Players',inB(B.b2p));
  const notes=[
    '1 Player — you vs. the AI',

    '',
    'Hit an enemy ship → answer a Cold War question.',

    '',

}

function drawPlacement(){
  ctx.fillStyle='#0f1932'; ctx.fillRect(0,0,W,H);
  const pl=state===P1P?'Player 1':'Player 2';
  ctx.font='bold 32px sans-serif'; ctx.fillStyle='#e6e6ff'; ctx.textAlign='center';
  ctx.fillText(`${pl} — Place Your Fleet`,W/2,50);
  const g=state===P1P?gridP1:gridP2;
  const hover=placementHover();
  let preview=null;
  if(hover&&plShips.length){
    const[r,c]=hover, sz=plShips[0];
    const valid=g.canPlace(r,c,sz,plOrient);
    preview=[r,c,sz,plOrient,valid];
  }
  drawGrid(g,...PG,false,preview);
  // ship list
  ctx.font='20px sans-serif'; ctx.fillStyle='#aabbd4'; ctx.textAlign='left';
  ctx.fillText('Ships to place:',715,165);
  for(let i=0;i<plShips.length;i++){
    const idx=SIZES.length-plShips.length+i;
    ctx.fillStyle=i===0?'#ffd75a':'#8899bb';
    ctx.fillText(`▶ ${NAMES[idx]}`,730,195+i*28);
  }
  if(!plShips.length){
    ctx.font='18px sans-serif'; ctx.fillStyle='#50d250';
    ctx.fillText('All ships placed!',715,400);
  }
  ctx.font='18px sans-serif'; ctx.fillStyle='#8899bb';
  ctx.fillText(`Orientation: ${plOrient==='H'?'Horizontal':'Vertical'}`,715,390);
  btn(...B.rot,`Rotate (${plOrient})`,inB(B.rot));
  btn(...B.rnd,'Randomize',inB(B.rnd));
  btn(...B.ok,'Confirm',inB(B.ok)&&!plShips.length,
    !plShips.length?'#284878':'#19283a');
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawPass(){
  ctx.fillStyle='#05091a'; ctx.fillRect(0,0,W,H);
  const lines=passMsg.split('\n');
  ctx.textAlign='center';
  ctx.font='bold 34px sans-serif'; ctx.fillStyle='#ffd75a';
  ctx.fillText(lines[0],W/2,280);
  ctx.font='24px sans-serif'; ctx.fillStyle='#aabbd4';
  for(let i=1;i<lines.length;i++) ctx.fillText(lines[i],W/2,330+i*36);
  ctx.font='20px sans-serif'; ctx.fillStyle='#7788aa';
  ctx.fillText('Click anywhere to continue',W/2,580);
  drawHud();
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawPlay(){
  ctx.fillStyle='#0f1932'; ctx.fillRect(0,0,W,H);
  const lgx=LG[0], lgy=LG[1], rgx=RG[0], rgy=RG[1];
  // In 1-player mode always show human (P1) on left, AI (P2) hidden on right.
  // In 2-player mode show current attacker's fleet on left, defender's hidden on right.
  const leftGrid  = twoPlayer ? atkGrid() : gridP1;
  const rightGrid = twoPlayer ? defGrid() : gridP2;
  // Labels
  ctx.font='20px sans-serif'; ctx.fillStyle='#aabbd4'; ctx.textAlign='center';
  if(twoPlayer){
    ctx.fillText(`Player ${curPlayer}'s Fleet`,lgx+N*CS/2,lgy-32);
    ctx.fillText("Enemy Waters",rgx+N*CS/2,rgy-32);
  }else{
    ctx.fillText('Your Fleet',lgx+N*CS/2,lgy-32);
    ctx.fillText('Enemy Waters',rgx+N*CS/2,rgy-32);
  }
  drawGrid(leftGrid,lgx,lgy,false);
  drawGrid(rightGrid,rgx,rgy,true);
  // Score
  ctx.font='18px sans-serif'; ctx.fillStyle='#ffd75a'; ctx.textAlign='left';
  if(twoPlayer){
    ctx.fillText(`P1 Bonus: ${scoreP1}`,20,145);
    ctx.fillText(`P2 Bonus: ${scoreP2}`,200,145);
  }else{
    ctx.fillText(`Bonus turns earned: ${scoreP1}`,20,145);
  }
  // Status
  ctx.font='22px sans-serif'; ctx.fillStyle='#ffd75a'; ctx.textAlign='center';
  ctx.fillText(status,W/2,140);
  // Hover highlight on enemy grid
  const hov=cellAt(rgx,rgy);
  if(hov&&state===PLAY&&(twoPlayer||curPlayer===1)){
    const[r,c]=hov;
    const v=rightGrid.cells[r][c];
    if(v==='~'||v==='S'){
      ctx.strokeStyle='rgba(255,255,150,0.7)'; ctx.lineWidth=2;
      ctx.strokeRect(rgx+c*CS+1,rgy+r*CS+1,CS-2,CS-2);
    }
  }
  // Game over banner
  if(state===OVER){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 52px sans-serif'; ctx.fillStyle='#ffd75a'; ctx.textAlign='center';
    ctx.fillText(status||'Game Over!',W/2,350);
    ctx.font='26px sans-serif'; ctx.fillStyle='#aabbd4';
    ctx.fillText('Click anywhere to return to menu',W/2,420);
  }
  drawHud();
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawQuestion(){
  drawPlay();
  // Dim overlay
  ctx.fillStyle='rgba(0,0,30,0.78)'; ctx.fillRect(0,0,W,H);
  // Panel
  const px=175,py=68,pw=750,ph=640;
  rect(px,py,pw,ph,'#101830','#3a5c8c',2,12);
  rect(px,py,pw,38,'#1a2d54',null,0,12);
  ctx.font='bold 20px sans-serif'; ctx.fillStyle='#e6e6ff'; ctx.textAlign='center';
  ctx.fillText('⚡ Cold War Question — Answer for a Bonus Turn!',px+pw/2,py+24);
  // Question text
  const qlines=wrapText(activeQ.q,680,'21px sans-serif');
  ctx.font='21px sans-serif'; ctx.fillStyle='#dde6ff'; ctx.textAlign='left';
  let qy=py+80;
  for(const l of qlines){ctx.fillText(l,px+35,qy); qy+=30;}
  // Answer buttons
  const colors=['#1e3a5f','#1e3a5f','#1e3a5f','#1e3a5f'];
  for(let i=0;i<4;i++){
    const[bx,by,bw,bh]=B.qbtns[i];
    let fill='#1e3a5f', stroke='#3a6aaf';
    if(qAnswer===-1&&inRect(bx,by,bw,bh)){fill='#2a4e7a'; stroke='#5a8ad0';}
    if(qAnswer===i){fill='#1e4a7a'; stroke='#78aaff';}
    if(qAnswer!==-1&&i===activeQ.a){fill='#1a4a22'; stroke='#50d250';}
    if(qAnswer!==-1&&qAnswer===i&&i!==activeQ.a){fill='#4a1a1a'; stroke='#d25050';}
    rect(bx,by,bw,bh,fill,stroke,2,8);
    // wrap choice text
    const clines=wrapText(activeQ.c[i],660,'20px sans-serif');
    ctx.font='20px sans-serif'; ctx.fillStyle='#dde6ff'; ctx.textAlign='left';
    const lineH=24;
    const textH=clines.length*lineH;
    let cy2=by+bh/2-textH/2+lineH/2;
    for(const cl of clines){ctx.fillText(cl,bx+14,cy2); cy2+=lineH;}
  }
  // Feedback & continue
  if(qAnswer!==-1){
    const correct=qAnswer===activeQ.a;
    ctx.font='bold 20px sans-serif'; ctx.fillStyle=correct?'#50d250':'#d25050'; ctx.textAlign='center';
    ctx.fillText(correct?'✓ Correct! You earn a BONUS TURN!':'✗ Incorrect. No bonus this time.',px+pw/2,B.qbtns[3][1]+B.qbtns[3][3]+30);
    const[cx2,cy2,cw,ch]=B.qcont;
    const chov=inRect(cx2,cy2,cw,ch);
    rect(cx2,cy2,cw,ch,chov?'#3c6496':'#284878',chov?'#5082c8':'#3a6090',2,8);
    ctx.font='22px sans-serif'; ctx.fillStyle='#e6e6ff';
    ctx.fillText('Continue →',cx2+cw/2,cy2+ch/2+7);
  }else{
    ctx.font='18px sans-serif'; ctx.fillStyle='#7788aa'; ctx.textAlign='center';
    ctx.fillText('Select an answer above',px+pw/2,B.qbtns[3][1]+B.qbtns[3][3]+26);
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ── INPUT ──────────────────────────────────────────────────────────────────
document.addEventListener('mousemove',e=>{const p=canvasPos(e);mx=p.x;my=p.y;});

document.addEventListener('click',e=>{
  const p=canvasPos(e); mx=p.x; my=p.y;

  // HUD buttons (all states except MENU and placement)
  if(state!==MENU&&state!==P1P&&state!==P2P){
    if(mx>=862&&mx<=970&&my>=10&&my<=44){newGame();return;}
    if(mx>=980&&mx<=1088&&my>=10&&my<=44){newGame();return;} // web: reset instead of quit
  }

  if(state===MENU){
    if(inB(B.b1p)){twoPlayer=false;setupPlacement(1);state=P1P;}
    else if(inB(B.b2p)){twoPlayer=true;setupPlacement(1);state=P1P;}
  }
  else if(state===P1P||state===P2P){
    const g=state===P1P?gridP1:gridP2;
    if(inB(B.rot)){plOrient=plOrient==='H'?'V':'H';}
    else if(inB(B.rnd)){g.randomize();plShips=[];}
    else if(inB(B.ok)&&!plShips.length){confirmPlacement();}
    else{
      const h=placementHover();
      if(h&&plShips.length){
        const[r,c]=h, sz=plShips[0];
        if(g.canPlace(r,c,sz,plOrient)){g.doPlace(r,c,sz,plOrient);plShips.shift();}
      }
    }
  }
  else if(state===PASS){state=passNext;}
  else if(state===PLAY){
    if(twoPlayer||curPlayer===1){
      const cell=cellAt(...RG);
      if(cell){
        const[r,c]=cell;
        const res=defGrid().attack(r,c);
        if(res==='hit'){
          if(defGrid().allSunk()){
            state=OVER;
            status=twoPlayer?`Player ${curPlayer} sank all ships! 🎉`:'You sank all enemy ships! You win!';
          }else{
            status=twoPlayer?`Player ${curPlayer} hit! Answer to earn a bonus turn.`:'Hit! Answer correctly for a bonus turn.';
            startQuestion();
          }
        }else if(res==='miss'){
          status=twoPlayer?`Player ${curPlayer} missed.`:'Missed. AI thinking…';
          if(twoPlayer) passToNext();
          else{curPlayer=2;aiDelay=0;}
        }
      }
    }
  }
  else if(state===QST){
    if(qAnswer===-1){
      for(let i=0;i<4;i++) if(inRect(...B.qbtns[i])){qAnswer=i;break;}
    }else if(inRect(...B.qcont)){resolveQuestion();}
  }
  else if(state===OVER){newGame();}
});

document.addEventListener('keydown',e=>{
  if((state===P1P||state===P2P)&&(e.key==='r'||e.key==='R'))
    plOrient=plOrient==='H'?'V':'H';
});

function confirmPlacement(){
  if(state===P1P){
    if(twoPlayer){
      setupPlacement(2);
      passMsg='Hand the device to Player 2\n\nPlayer 2 — place your fleet!';
      passNext=P2P; state=PASS;
    }else{
      gridP2=new Grid(true);
      curPlayer=1; status='Your turn — click the enemy grid to fire!'; state=PLAY;
    }
  }else{
    curPlayer=1; status="Player 1's turn — click the enemy grid!";
    passMsg='Hand the device back to Player 1\n\nThe battle begins!';
    passNext=PLAY; state=PASS;
  }
}

// ── GAME LOOP ──────────────────────────────────────────────────────────────
function loop(ts){
  const dt=ts-lastTime; lastTime=ts;
  // AI turn
  if(state===PLAY&&!twoPlayer&&curPlayer===2){
    aiDelay+=dt;
    if(aiDelay>=700){
      aiTurn();
      if(gridP1.allSunk()){state=OVER;status='All your ships sunk — AI Wins!';}
      else{curPlayer=1;}
      aiDelay=0;
    }
  }
  // Draw
  if(state===MENU) drawMenu();
  else if(state===P1P||state===P2P) drawPlacement();
  else if(state===PASS) drawPass();
  else if(state===PLAY||state===OVER) drawPlay();
  else if(state===QST) drawQuestion();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
